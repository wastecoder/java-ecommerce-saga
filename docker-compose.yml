name: shopflow

services:
  postgres:
    image: postgres:17
    container_name: shopflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shopflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shopflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [shopflow]

  kafka:
    image: apache/kafka-native:4.3.0
    container_name: shopflow-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"   # EXTERNAL listener for host / Gradle bootRun
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    # Broker storage is ephemeral on purpose: the kafka-native image runs as a non-root
    # user that cannot write to a root-owned named volume, and local dev does not need the
    # log to survive `compose down` (topics are (re)created by KafkaTopicsConfig).
    networks: [shopflow]

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: shopflow-kafka-ui
    depends_on:
      kafka:
        condition: service_started
    ports:
      - "${KAFKA_UI_PORT:-8085}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: shopflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks: [shopflow]

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: shopflow-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # The Spring services run on the host (bootRun); host-gateway lets Prometheus scrape
    # host.docker.internal:<port> from inside the container (works on Docker Desktop and Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [shopflow]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: shopflow-grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # Mount the provisioning subfolders individually so Grafana's built-in (empty) plugins/alerting
      # provisioning dirs stay intact — overlaying the whole folder makes Grafana log harmless errors.
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks: [shopflow]

  zipkin:
    image: openzipkin/zipkin:3.6.0
    container_name: shopflow-zipkin
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"   # UI + span ingest (POST /api/v2/spans) for host bootRun services
    # In-memory storage (default STORAGE_TYPE=mem) is fine for local dev — traces are ephemeral, like the
    # Kafka log. The Spring services run on the host (bootRun) and push spans to localhost:9411.
    networks: [shopflow]

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: shopflow-keycloak
    # dev mode: in-memory H2 + relaxed hostname/HTTP. --import-realm seeds the realm from the mounted
    # export on every start, so the JSON below is the source of truth (manual admin-console edits are
    # lost on restart — same ephemeral philosophy as the Kafka log and the Zipkin store).
    command: start-dev --import-realm
    environment:
      # Renamed in Keycloak 26 (were KEYCLOAK_ADMIN / KEYCLOAK_ADMIN_PASSWORD): the bootstrap admin
      # of the *master* realm, used only to log into the admin console at :8088.
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      # host 8088 -> container 8080 (mirrors kafka-ui's 8085:8080). The token issuer is derived from
      # the request host, so everything reaching Keycloak via localhost:8088 sees a consistent issuer
      # http://localhost:8088/realms/shopflow (the Spring services run on the host via bootRun).
      - "${KEYCLOAK_PORT:-8088}:8080"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks: [shopflow]

volumes:
  postgres-data:
  grafana-data:

networks:
  shopflow:
    driver: bridge
