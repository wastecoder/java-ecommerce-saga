spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/paymentdb
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  docker:
    compose:
      enabled: false
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.wastecoder.shopflow.payment.adapter.messaging.EventEnvelope
        spring.json.trusted.packages: com.wastecoder.shopflow.payment.adapter.messaging

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

problem-details:
  base-uri: https://wastecoder.com/problems

# Controllable PSP mock (see PspProperties). DECLINE_ABOVE_THRESHOLD lets the order amount steer the
# outcome (amount >= decline-threshold is declined); APPROVE_ALL / DECLINE_ALL force a single outcome.
shopflow:
  payment:
    psp:
      mode: DECLINE_ABOVE_THRESHOLD
      decline-threshold: 1000.00
