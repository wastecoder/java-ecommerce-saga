# E2E config for the order-service context. Loaded via --spring.config.location (replaces the default
# application.yaml so the four merged service configs on the shared classpath do not collide). Datasource
# url, Kafka bootstrap-servers and server.port are injected at runtime as command-line args.
spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.wastecoder.shopflow.order.adapter.messaging.EventEnvelope
        spring.json.trusted.packages: com.wastecoder.shopflow.order.adapter.messaging

eureka:
  client:
    enabled: false

# Tracing/observation stays active (trace context still propagates across the saga over Kafka), but
# spans are never shipped to Zipkin during the E2E test — there is no Zipkin backend in CI.
management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: false

problem-details:
  base-uri: https://wastecoder.com/problems
