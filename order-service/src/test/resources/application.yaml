spring:
  # The test application.yaml shadows src/main (Spring Boot loads classpath:/application.yaml from the
  # first classpath root only), so the Kafka serde config that production needs is mirrored here.
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.wastecoder.shopflow.order.adapter.messaging.EventEnvelope
        spring.json.trusted.packages: com.wastecoder.shopflow.order.adapter.messaging

eureka:
  client:
    enabled: false

problem-details:
  base-uri: https://wastecoder.com/problems
