spring:
  # The test application.yaml shadows src/main (Spring Boot loads classpath:/application.yaml from the
  # first classpath root only), so the Kafka serde config that production needs is mirrored here.
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.wastecoder.shopflow.order.adapter.messaging.EventEnvelope
        spring.json.trusted.packages: com.wastecoder.shopflow.order.adapter.messaging
    # Mirrors production: enabling observation makes the producer inject the trace context into the
    # Kafka record headers (asserted by KafkaTracePropagationIntegrationTest).
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

eureka:
  client:
    enabled: false

# Tracing stays active (so the Kafka traceparent propagation test is deterministic), but spans are
# never shipped to Zipkin during tests — there is no Zipkin backend in CI / the test JVM.
management:
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        enabled: false

problem-details:
  base-uri: https://wastecoder.com/problems
