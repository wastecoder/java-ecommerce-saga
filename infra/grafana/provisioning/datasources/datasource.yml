# Grafana datasource provisioning: the Prometheus instance from docker-compose, reachable by service
# name on the shared `shopflow` network. The fixed uid lets the provisioned dashboards reference it.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
