# Prometheus scrape config for ShopFlow.
# The Spring services run on the HOST (./gradlew bootRun) while Prometheus runs in a container, so it
# reaches them via host.docker.internal (mapped to the host gateway in docker-compose). One job per
# service so the `job` label carries a friendly service name (the app metrics also carry an
# `application` tag from management.metrics.tags). Targets that are down simply show up == 0.
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084"]
  - job_name: discovery-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8761"]
